name: Deploy to Server

on:
  # Runs automatically after build-and-push completes
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy if the build actually succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: SSH into server and pull new image
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/budget-bot:latest
            docker stop budget-bot || true
            docker rm   budget-bot || true
            docker run -d \
              --name budget-bot \
              --restart unless-stopped \
              --env-file /home/${{ secrets.SERVER_USER }}/budget-bot.env \
              -v /home/${{ secrets.SERVER_USER }}/data:/app/data \
              ${{ secrets.DOCKER_USERNAME }}/budget-bot:latest
            docker image prune -f
